services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./files:/app_fastapi/files

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend