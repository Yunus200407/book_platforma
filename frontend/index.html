<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kitob</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="authPage">
  <div class="auth-box">
    <div class="auth-logo">
      Kitob
      <span>Kitoblar platformasi</span>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Kirish</button>
      <button class="tab-btn" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
    </div>
    <div id="authMsg"></div>
    <div id="loginForm">
      <div class="form-group">
        <label>Foydalanuvchi nomi</label>
        <input type="text" id="loginUsername" placeholder="username"/>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <button class="btn btn-full" onclick="login()">Kirish</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Foydalanuvchi nomi</label>
        <input type="text" id="regUsername" placeholder="username"/>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <input type="password" id="regPassword" placeholder="••••••••"/>
      </div>
      <button class="btn btn-full" onclick="register()">Ro'yxatdan o'tish</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app-wrap" id="appPage">
  <div class="topbar">
    <div class="topbar-logo">Kitob</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Chiqish</button>
    </div>
  </div>
  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">Kitoblar</h1>
      <button class="btn btn-sm" onclick="openAddModal()">+ Kitob qo'shish</button>
    </div>
    <div id="appMsg"></div>
    <div id="booksContainer"><div class="loading-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="bookModal">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">Kitob qo'shish</h2>
    <div id="modalMsg"></div>
    <input type="hidden" id="editBookId"/>
    <div class="form-group">
      <label>Sarlavha</label>
      <input type="text" id="bookTitle" placeholder="Kitob nomi"/>
    </div>
    <div class="form-group">
      <label>Muallif</label>
      <input type="text" id="bookAuthor" placeholder="Muallif ismi"/>
    </div>
    <div class="form-group">
      <label>Tavsif</label>
      <textarea id="bookDesc" placeholder="Kitob haqida qisqacha..."></textarea>
    </div>
    <div class="form-group">
      <label>Fayl yo'li (path)</label>
      <input type="text" id="bookPath" placeholder="files/kitob.pdf"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor</button>
      <button class="btn" id="modalSaveBtn" onclick="saveBook()">Saqlash</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="deleteModal">
  <div class="modal" style="max-width:360px;text-align:center;">
    <div style="font-size:36px;margin-bottom:1rem;">&#9888;</div>
    <h2 class="modal-title" style="font-size:18px;">Kitobni o'chirish</h2>
    <p style="color:var(--text2);font-size:14px;">Bu amalni qaytarib bo'lmaydi.</p>
    <div class="modal-footer" style="justify-content:center;">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Bekor</button>
      <button class="btn btn-danger" onclick="confirmDelete()">O'chirish</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
